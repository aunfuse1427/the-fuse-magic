    <!-- Custom CSS for Glows and Animations -->
    <style>
        body {
            /* Epic Animated Galaxy Background */
            background: linear-gradient(120deg, #050608, #1a1a2e, #0f0c29);
            background-size: 400% 400%;
            animation: nebulaFlow 20s ease infinite;
            color: theme('colors.on-background');
            margin: 0;
            overflow: hidden;
        }

        @keyframes nebulaFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-pane {
            background-color: rgba(26, 26, 46, 0.4);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .ambient-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(233, 193, 118, 0.2) 0%, rgba(18, 20, 20, 0) 70%);
            pointer-events: none;
            z-index: 0;
            mix-blend-mode: screen;
        }

        .btn-ghost {
            border: 1px solid theme('colors.secondary');
            color: theme('colors.secondary');
            transition: all 0.3s ease;
        }

        .btn-ghost:hover {
            box-shadow: 0 0 20px rgba(233, 193, 118, 0.4);
            background-color: rgba(233, 193, 118, 0.1);
        }

        /* Control Panels (Topic & Mode) */
        .controls-panel {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
            z-index: 50;
            position: relative;
        }
        .control-btn {
            background: rgba(26, 26, 46, 0.6);
            border: 1px solid rgba(233, 193, 118, 0.3);
            color: #bbc5eb;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: theme('fontFamily.body-md');
            font-size: 14px;
        }
        .control-btn:hover {
            background: rgba(233, 193, 118, 0.1);
        }
        .control-btn.active {
            background: rgba(233, 193, 118, 0.2);
            border-color: #e9c176;
            color: #e9c176;
            box-shadow: 0 0 15px rgba(233, 193, 118, 0.4);
        }

        /* Drop Zones */
        .drop-zone-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            gap: 20px;
            z-index: 20;
            pointer-events: none; /* Let clicks pass through if needed */
        }
        .drop-slot {
            width: 80px;
            height: 125px;
            border: 2px dashed rgba(233, 193, 118, 0.3);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(233, 193, 118, 0.6);
            font-size: 12px;
            text-align: center;
            background: rgba(0, 0, 0, 0.4);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
            transition: all 0.4s;
            backdrop-filter: blur(4px);
        }
        @media (min-width: 768px) {
            .drop-slot { width: 120px; height: 190px; font-size: 14px; }
        }
        @media (min-width: 1024px) {
            .drop-slot { width: 140px; height: 220px; }
        }
        .drop-slot.active-slot {
            border-style: solid;
            color: rgba(233, 193, 118, 1);
            box-shadow: 0 0 20px rgba(233, 193, 118, 0.3) inset, 0 0 15px rgba(233, 193, 118, 0.4);
            animation: pulse-glow 2s infinite;
        }
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 20px rgba(233, 193, 118, 0.2) inset, 0 0 10px rgba(233, 193, 118, 0.2); }
            50% { box-shadow: 0 0 30px rgba(233, 193, 118, 0.5) inset, 0 0 25px rgba(233, 193, 118, 0.5); }
            100% { box-shadow: 0 0 20px rgba(233, 193, 118, 0.2) inset, 0 0 10px rgba(233, 193, 118, 0.2); }
        }

        /* Video / Canvas stacking */
        .ritual-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #input_video {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            opacity: 0.2;
            filter: grayscale(100%) contrast(1.2) sepia(30%) hue-rotate(180deg);
        }

        #output_canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            z-index: 10;
        }

        .geometric-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 50% 50%, transparent 60%, rgba(233, 193, 118, 0.05) 100%);
            pointer-events: none;
            z-index: 5;
        }

        .split-layout {
            display: block;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        .ritual-space {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.5;
            pointer-events: none;
            mix-blend-mode: screen;
        }
        
        .interpretation-space {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            background: transparent;
        }

        @keyframes floating {
            0% { transform: translate(var(--tx, 0px), var(--ty, 0px)) rotate(var(--base-rot, 0deg)); }
            50% { transform: translate(var(--tx, 0px), calc(var(--ty, 0px) - 10px)) rotate(calc(var(--base-rot, 0deg) + 2deg)); box-shadow: 0 15px 25px rgba(233,193,118,0.2); }
            100% { transform: translate(var(--tx, 0px), var(--ty, 0px)) rotate(var(--base-rot, 0deg)); }
        }

        .spread-container {
            position: relative;
            width: 100%;
            height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: visible;
        }

        .tarot-card {
            position: absolute;
            width: 80px;
            height: 125px;
            bottom: auto;
            transform-origin: center center;
            transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94), box-shadow 0.3s, opacity 0.5s;
            cursor: pointer;
            perspective: 1000px;
        }
        
        @media (min-width: 768px) {
            .tarot-card {
                width: 120px;
                height: 190px;
            }
        }
        @media (min-width: 1024px) {
            .tarot-card {
                width: 140px;
                height: 220px;
            }
        }

        @media (hover: hover) {
            .tarot-card:hover:not(.is-flipped):not(.is-selected) {
                transform: translate(var(--tx, 0px), calc(var(--ty, 0px) - 30px)) scale(1.1) rotate(var(--base-rot, 0deg)) !important;
                z-index: 50 !important;
                box-shadow: 0 15px 40px rgba(233, 193, 118, 0.6);
                animation: none !important;
            }
        }

        .tarot-card.is-hovered:not(.is-flipped):not(.is-selected) {
            transform: translate(var(--tx, 0px), calc(var(--ty, 0px) - 30px)) scale(1.1) rotate(var(--base-rot, 0deg)) !important;
            z-index: 50 !important;
            box-shadow: 0 15px 40px rgba(233, 193, 118, 0.6);
            animation: none !important;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Bouncy flip */
            transform-style: preserve-3d;
        }

        .tarot-card.is-flipped .card-inner {
            transform: rotateY(180deg);
        }
        
        .tarot-card.is-selected {
            /* Remove absolute fixed centering, JS will set drop slot transform */
            z-index: 100 !important;
            animation: none !important;
            box-shadow: 0 0 30px rgba(233, 193, 118, 0.5);
            border-radius: theme('borderRadius.lg');
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: theme('borderRadius.lg');
            box-shadow: 0 5px 15px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* --- New Majestic Card Back --- */
        .card-back {
            background-color: #0f1b38; /* Deep Mystical Blue */
            border: 1px solid theme('colors.secondary');
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(233, 193, 118, 0.15) 0%, transparent 60%),
                repeating-linear-gradient(45deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 2px, transparent 2px, transparent 4px);
            box-shadow: inset 0 0 25px rgba(0,0,0,0.9);
        }
        .card-back::after {
            content: '✧';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 56px;
            color: rgba(233, 193, 118, 0.8);
            text-shadow: 0 0 20px rgba(233, 193, 118, 1);
        }
        .card-back::before {
            content: '';
            position: absolute;
            inset: 6px;
            border: 2px solid rgba(233, 193, 118, 0.4);
            border-radius: 6px;
            background: linear-gradient(135deg, transparent 40%, rgba(233, 193, 118, 0.15) 50%, transparent 60%);
            background-size: 200% 200%;
            animation: shimmer 3s infinite linear;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .card-front {
            background-color: #1a1a2e;
            border: 2px solid theme('colors.secondary');
            transform: rotateY(180deg);
            padding: 8px;
        }
        
        .card-front::before {
            content: '';
            position: absolute;
            inset: 4px;
            border: 1px solid rgba(233, 193, 118, 0.4);
            border-radius: 4px;
            pointer-events: none;
            z-index: 10;
        }

        #hand-cursor {
            position: fixed;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background-color: rgba(233, 193, 118, 0.9);
            box-shadow: 0 0 20px rgba(233, 193, 118, 0.8), inset 0 0 10px #fff;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            display: none;
            transition: transform 0.1s;
        }
        
        #hand-cursor.pinching {
            background-color: #fff;
            transform: translate(-50%, -50%) scale(0.6);
            box-shadow: 0 0 30px #fff;
        }
    </style>

        document.addEventListener('DOMContentLoaded', () => {
            
            // --- Global State & Configuration ---
            let currentTopic = "ภาพรวม";
            let currentMode = 1;
            let selectedCardsData = [];
            const allCards = [];
            let isDeckSpread = false;
            let previousHandX = null;

            const spreadContainer = document.getElementById('tarot-spread');
            const dropZonesContainer = document.getElementById('drop-zones');
            const instructionText = document.getElementById('instruction-text');
            const manualSpreadBtn = document.getElementById('manual-spread-btn');
            
            const readingResultPanel = document.getElementById('reading-result');
            const resultTopicTitle = document.getElementById('result-topic-title');
            const cardsResultContainer = document.getElementById('cards-result-container');
            const resetBtn = document.getElementById('reset-btn');

            // --- UI Controls Binding ---
            document.querySelectorAll('.control-btn[data-topic]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.control-btn[data-topic]').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    currentTopic = e.target.dataset.topic;
                    resetReading(); // กรีดไพ่ใหม่ทันที
                });
            });

            document.querySelectorAll('.control-btn[data-mode]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.control-btn[data-mode]').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    currentMode = parseInt(e.target.dataset.mode);
                    resetReading(); // กรีดไพ่ใหม่ทันที
                });
            });

            // --- Render Drop Slots ---
            function renderDropZones() {
                dropZonesContainer.innerHTML = '';
                const labels = currentMode === 1 ? ["วางไพ่ตรงนี้"] : ["อดีต", "ปัจจุบัน", "อนาคต"];
                for (let i = 0; i < currentMode; i++) {
                    const slot = document.createElement('div');
                    slot.className = `drop-slot ${i === 0 ? 'active-slot' : ''}`;
                    slot.innerText = labels[i];
                    slot.dataset.slotIndex = i;
                    dropZonesContainer.appendChild(slot);
                }
                dropZonesContainer.style.opacity = '0'; // ซ่อนไว้ก่อนจนกว่าจะกรีดไพ่
            }

            // --- Initialization & Circular Spread Math ---
            function initDeck() {
                spreadContainer.querySelectorAll('.tarot-card').forEach(c => c.remove());
                allCards.length = 0;
                
                const totalCards = 22;
                // ปรับขนาดวงกลมให้พอดีกับหน้าจอ
                let radius = 320;
                if (window.innerWidth < 768) {
                    radius = 110;
                } else if (window.innerWidth < 1024) {
                    radius = 240;
                }
                const angleStep = 360 / totalCards;

                // สุ่มไพ่ใหม่ทุกครั้งที่จัดกอง
                const shuffledDeck = [...tarotDeck].sort(() => Math.random() - 0.5);

                for (let i = 0; i < totalCards; i++) {
                    const angle = i * angleStep;
                    const rad = angle * (Math.PI / 180);
                    
                    // คำนวณพิกัดวงกลมรอบจุดศูนย์กลาง
                    const tx = Math.sin(rad) * radius;
                    const ty = -Math.cos(rad) * radius;

                    const card = document.createElement('div');
                    card.className = 'tarot-card';
                    
                    // กองตรงกลางแบบเหลื่อมกันเล็กน้อยในตอนเริ่ม
                    const initialTx = 0;
                    const initialTy = i * -1.2; 
                    
                    // ใช้ CSS Variables เพื่อให้ลอยขึ้นลงร่วมกับพิกัด X, Y ได้
                    card.style.setProperty('--tx', `${initialTx}px`);
                    card.style.setProperty('--ty', `${initialTy}px`);
                    card.style.setProperty('--base-rot', `0deg`);
                    card.style.transform = `translate(${initialTx}px, ${initialTy}px) rotate(0deg)`;
                    card.style.zIndex = i;
                    
                    card.style.animation = `floating 4s ease-in-out infinite`;
                    card.style.animationDelay = `${i * 0.05}s`;
                    
                    // บันทึกตำแหน่งเป้าหมายสำหรับการกางเป็นวงกลมโดยแยกตัวแปรชัดเจน
                    card.dataset.targetTx = tx;
                    card.dataset.targetTy = ty;
                    card.dataset.targetRot = angle;
                    
                    card.dataset.baseTx = initialTx;
                    card.dataset.baseTy = initialTy;
                    card.dataset.baseRot = 0;
                    
                    card.dataset.cardId = shuffledDeck[i].id; // ล็อก ID ไว้กับ Element
                    
                    const cardData = shuffledDeck[i];

                    card.innerHTML = `
                        <div class="card-inner">
                            <div class="card-back"></div>
                            <div class="card-front">
                                <img src="${cardData.image}" alt="${cardData.name}" style="width: 100%; height: 100%; object-fit: cover; border-radius: 2px;">
                            </div>
                        </div>
                    `;

                    card.addEventListener('click', function() {
                        handleCardSelect(this);
                    });

                    spreadContainer.appendChild(card);
                    allCards.push(card);
                }
            }

            renderDropZones();
            initDeck();

            // --- Spreading Action ---
            window.spreadDeck = function() {
                if (!isDeckSpread) {
                    isDeckSpread = true;
                    dropZonesContainer.style.opacity = '1';
                    
                    allCards.forEach((c, i) => {
                        const targetTx = c.dataset.targetTx;
                        const targetTy = c.dataset.targetTy;
                        const targetRot = c.dataset.targetRot;
                        
                        // อัปเดตตัวแปรพิกัดเพื่อให้แอนิเมชันนำไปใช้ทำงานร่วมกันได้
                        c.style.setProperty('--tx', `${targetTx}px`);
                        c.style.setProperty('--ty', `${targetTy}px`);
                        c.style.setProperty('--base-rot', `${targetRot}deg`);
                        c.style.transform = `translate(${targetTx}px, ${targetTy}px) rotate(${targetRot}deg)`;
                        
                        c.style.animation = `floating 4s ease-in-out infinite`;
                        c.style.animationDelay = `${i * 0.05}s`;
                    });
                    
                    instructionText.innerText = `หยิบไพ่ ${currentMode} ใบมาปล่อยในช่องเพื่อทำนายเรื่อง ${currentTopic}`;
                    manualSpreadBtn.style.display = 'none';
                }
            };

            manualSpreadBtn.addEventListener('click', window.spreadDeck);

            // --- Card Selection to Drop Slot Logic ---
            function handleCardSelect(card) {
                if (card.classList.contains('is-selected') || selectedCardsData.length >= currentMode || !isDeckSpread) return;
                
                // ดึง Data ที่ตรงกับไพ่ที่ถูกคลิก
                const cardData = tarotDeck.find(d => d.id === card.dataset.cardId);
                const currentSlotIndex = selectedCardsData.length;
                const slot = dropZonesContainer.children[currentSlotIndex];
                
                card.style.opacity = '1';
                card.classList.add('is-selected', 'is-flipped');
                
                // คำนวณพิกัดให้ไพ่วิ่งไปหา Slot ตรงกลางเป๊ะๆ
                const slotRect = slot.getBoundingClientRect();
                const spreadRect = spreadContainer.getBoundingClientRect();
                const dropTx = (slotRect.left + slotRect.width/2) - (spreadRect.left + spreadRect.width/2);
                const dropTy = (slotRect.top + slotRect.height/2) - (spreadRect.top + spreadRect.height/2);

                card.style.setProperty('--tx', `${dropTx}px`);
                card.style.setProperty('--ty', `${dropTy}px`);
                card.style.setProperty('--base-rot', `0deg`);
                card.style.transform = `translate(${dropTx}px, ${dropTy}px) scale(1) rotate(0deg)`;
                card.style.zIndex = 100 + currentSlotIndex;
                
                selectedCardsData.push(cardData);
                
                // อัปเดตสถานะของ Slot
                slot.classList.remove('active-slot');
                slot.innerText = '';
                
                if (currentSlotIndex + 1 < currentMode) {
                    dropZonesContainer.children[currentSlotIndex + 1].classList.add('active-slot');
                    instructionText.innerText = `เลือกไพ่ใบที่ ${currentSlotIndex + 2}`;
                }

                // เมื่อเลือกครบตามโหมดที่ตั้งไว้
                if (selectedCardsData.length === currentMode) {
                    spreadContainer.style.pointerEvents = 'none'; // ป้องกันการกดเพิ่ม
                    allCards.forEach(c => {
                        if (!c.classList.contains('is-selected')) c.style.opacity = '0.1'; // จางไพ่ที่ไม่ได้เลือก
                    });
                    showReading();
                }
            }

            // --- Display Result ---
            function showReading() {
                setTimeout(() => {
                    resultTopicTitle.innerText = `คำทำนาย: ${currentTopic}`;
                    cardsResultContainer.innerHTML = '';
                    
                    const labels = currentMode === 1 ? ["ภาพรวม"] : ["อดีต", "ปัจจุบัน", "อนาคต"];
                    
                    // สร้าง Block คำทำนายตามจำนวนไพ่
                    selectedCardsData.forEach((data, idx) => {
                        const box = document.createElement('div');
                        box.className = "flex-1 flex flex-col items-center bg-surface-container/40 p-6 rounded-2xl border border-white/10 shadow-lg";
                        box.innerHTML = `
                            <div class="font-label-sm text-secondary mb-4 bg-secondary/10 px-4 py-1 rounded-full border border-secondary/20 shadow-[0_0_10px_rgba(233,193,118,0.2)]">${labels[idx]}</div>
                            <img src="${data.image}" class="w-32 h-auto rounded-lg shadow-2xl mb-6 border border-white/5">
                            <h4 class="font-headline-lg text-xl text-white mb-2 uppercase">${data.name}</h4>
                            <p class="font-label-sm text-tertiary mb-4 text-xs leading-tight text-center max-w-[200px]">[ ${data.meaning_upright} ]</p>
                            <div class="h-px w-16 bg-white/10 mb-4"></div>
                            <p class="font-body-md text-on-surface-variant text-sm leading-relaxed text-left w-full">${data.description}</p>
                        `;
                        cardsResultContainer.appendChild(box);
                    });
                    
                    readingResultPanel.style.display = 'flex';
                    readingResultPanel.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    
                    setTimeout(() => {
                        readingResultPanel.classList.remove('opacity-0');
                        readingResultPanel.classList.add('opacity-100');
                    }, 50);
                }, 800); // ดีเลย์รอให้ไพ่พลิกเสร็จ
            }

            // --- Reset Logic ---
            function resetReading() {
                readingResultPanel.classList.remove('opacity-100');
                readingResultPanel.classList.add('opacity-0');
                
                setTimeout(() => {
                    readingResultPanel.style.display = 'none';
                    isDeckSpread = false;
                    previousHandX = null;
                    selectedCardsData = [];
                    
                    instructionText.innerText = "ปัดมือผ่านกล้องเพื่อกรีดไพ่";
                    manualSpreadBtn.style.display = 'block';
                    
                    renderDropZones();
                    initDeck(); // วางกองและสุ่มไพ่ใหม่ทั้งหมด
                    
                    spreadContainer.style.pointerEvents = 'auto';
                }, 500);
            }

            resetBtn.addEventListener('click', resetReading);


            // --- MediaPipe Logic ---
            const videoElement = document.getElementById('input_video');
            const canvasElement = document.getElementById('output_canvas');
            const canvasCtx = canvasElement.getContext('2d');
            const statusLabel = document.getElementById('tracking-status');
            const errorLabel = document.getElementById('error-message');
            const cursor = document.getElementById('hand-cursor');
            
            let cardSelectionCooldown = false;
            
            // Set canvas size to match parent
            function resizeCanvas() {
                const container = canvasElement.parentElement;
                canvasElement.width = container.clientWidth;
                canvasElement.height = container.clientHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            // Handle Camera Errors
            function handleCameraError(error) {
                console.error("Camera access denied or failed:", error);
                statusLabel.innerText = "SENSOR DISCONNECTED";
                statusLabel.classList.replace('text-tertiary', 'text-error');
                
                errorLabel.innerText = "ไม่สามารถเข้าถึงกล้องได้ กรุณาอนุญาตการใช้งานกล้อง";
                errorLabel.classList.remove('hidden');
            }

            // MediaPipe Hands Initialization
            const hands = new Hands({
                locateFile: (file) => {
                    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
                }
            });

            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.7,
                minTrackingConfidence: 0.7
            });

            function getDistance(p1, p2) {
                return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));
            }

            // Drawing Logic and Interaction
            hands.onResults((results) => {
                canvasCtx.save();
                canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
                
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    statusLabel.innerText = "ENERGY DETECTED";
                    statusLabel.classList.add('text-secondary');
                    
                    cursor.style.display = 'block';
                    
                    for (const landmarks of results.multiHandLandmarks) {
                        
                        // Draw Connectors with Gold Glow
                        canvasCtx.shadowBlur = 10;
                        canvasCtx.shadowColor = '#e9c176';
                        drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {
                            color: 'rgba(233, 193, 118, 0.4)', 
                            lineWidth: 2
                        });
                        
                        // Draw Landmarks (Nodes)
                        canvasCtx.shadowBlur = 15;
                        drawLandmarks(canvasCtx, landmarks, {
                            color: '#e9c176', 
                            fillColor: '#121414',
                            lineWidth: 1,
                            radius: 3
                        });
                        
                        // Special glow on fingertips
                        const fingerTips = [4, 8, 12, 16, 20];
                        fingerTips.forEach(tip => {
                            const point = landmarks[tip];
                            canvasCtx.beginPath();
                            canvasCtx.arc(point.x * canvasElement.width, point.y * canvasElement.height, 6, 0, 2 * Math.PI);
                            canvasCtx.fillStyle = 'rgba(233, 193, 118, 0.8)';
                            canvasCtx.fill();
                        });
                        
                        // Hand Tracking Logic for Tarot Selection
                        const indexTip = landmarks[8];
                        const thumbTip = landmarks[4];
                        
                        // Map index finger to screen coordinates
                        // (1 - x) to account for mirrored video if necessary, or just use mapped coords based on typical setup
                        // Mediapipe coordinates are [0, 1] relative to the input image
                        const screenX = (1 - indexTip.x) * window.innerWidth;
                        const screenY = indexTip.y * window.innerHeight;
                        
                        cursor.style.left = `${screenX}px`;
                        cursor.style.top = `${screenY}px`;
                        
                        // --- Swipe Detection for Spreading Deck ---
                        if (!isDeckSpread) {
                            if (previousHandX !== null) {
                                let distance = Math.abs(screenX - previousHandX);
                                if (distance > 60) { // Threshold for swiping
                                    window.spreadDeck(); // เรียกใช้ฟังก์ชันหลักแทนการจัดการตรงนี้
                                }
                            }
                            previousHandX = screenX;
                            // Reset context and skip hover logic while stacked
                            canvasCtx.restore();
                            return; 
                        }
                        
                        // Check for hover
                        let hoveredCard = null;
                        
                        // Reset all hovers
                        allCards.forEach(c => c.classList.remove('is-hovered'));
                        
                        // Simple bounding box check
                        // Note: iterating backwards to favor cards drawn on top (higher z-index)
                        for (let i = allCards.length - 1; i >= 0; i--) {
                            const card = allCards[i];
                            if (card.classList.contains('is-selected')) continue;
                            
                            const rect = card.getBoundingClientRect();
                            if (screenX >= rect.left && screenX <= rect.right &&
                                screenY >= rect.top && screenY <= rect.bottom) {
                                hoveredCard = card;
                                card.classList.add('is-hovered');
                                break; // Only hover the top-most card
                            }
                        }
                        
                        // Pinch gesture detection
                        const pinchDistance = getDistance(indexTip, thumbTip);
                        const isPinching = pinchDistance < 0.05;
                        
                        if (isPinching) {
                            cursor.classList.add('pinching');
                            if (hoveredCard && !cardSelectionCooldown) {
                                handleCardSelect(hoveredCard);
                                cardSelectionCooldown = true;
                                setTimeout(() => { cardSelectionCooldown = false; }, 1000);
                            }
                        } else {
                            cursor.classList.remove('pinching');
                        }
                    }
                } else {
                    statusLabel.innerText = "AWAITING PRESENCE...";
                    statusLabel.classList.remove('text-secondary');
                    statusLabel.classList.add('text-tertiary');
                    cursor.style.display = 'none';
                    allCards.forEach(c => c.classList.remove('is-hovered'));
                }
                canvasCtx.restore();
            });

            // Camera Initialization (ใช้ Native WebRTC เพื่อความรวดเร็วและรองรับกล้องทุกรุ่น)
            let lastVideoTime = -1;
            async function processVideoFrame() {
                if (videoElement.currentTime !== lastVideoTime) {
                    lastVideoTime = videoElement.currentTime;
                    try {
                        await hands.send({image: videoElement});
                    } catch (error) {
                        console.warn("MediaPipe กำลังเตรียมความพร้อม...");
                    }
                }
                requestAnimationFrame(processVideoFrame);
            }

            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                // ไม่บังคับ Resolution ให้ระบบเลือกค่าที่ดีที่สุดของกล้องนั้นๆ เอง
                navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
                    .then((stream) => {
                        videoElement.srcObject = stream;
                        videoElement.addEventListener('loadeddata', () => {
                            videoElement.play();
                            statusLabel.innerText = "AWAITING PRESENCE...";
                            processVideoFrame(); // เริ่มลูปส่งภาพให้ AI วิเคราะห์
                        });
                    })
                    .catch((err) => {
                        handleCameraError(err);
                    });
            } else {
                handleCameraError(new Error("อุปกรณ์หรือเบราว์เซอร์ไม่รองรับกล้อง กรุณาใช้ HTTPS หรือ Live Server"));
            }
        });
    </script>
</body>
</html>
