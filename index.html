    <!-- Custom CSS for Glows and Animations -->
    <style>
        body {
            background-color: theme('colors.background');
            color: theme('colors.on-background');
            margin: 0;
            overflow: hidden;
        }

        .glass-pane {
            background-color: rgba(26, 26, 46, 0.4);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .ambient-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(233, 193, 118, 0.15) 0%, rgba(18, 20, 20, 0) 70%);
            pointer-events: none;
            z-index: 0;
        }

        .btn-ghost {
            border: 1px solid theme('colors.secondary');
            color: theme('colors.secondary');
            transition: all 0.3s ease;
        }

        .btn-ghost:hover {
            box-shadow: 0 0 15px rgba(233, 193, 118, 0.3);
            background-color: rgba(255, 255, 255, 0.05);
        }

        /* Video / Canvas stacking */
        .ritual-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #input_video {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Mirror */
            opacity: 0.3; /* Blend into background */
            filter: grayscale(100%) contrast(1.2);
        }

        #output_canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Mirror */
            z-index: 10;
        }

        /* Geometric Overlay for Ritual Space */
        .geometric-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            height: 80%;
            border: 1px solid rgba(233, 193, 118, 0.2);
            pointer-events: none;
            z-index: 5;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
        }
        
        .geometric-overlay::before, .geometric-overlay::after {
            content: '';
            position: absolute;
            background: rgba(233, 193, 118, 0.2);
        }
        
        .geometric-overlay::before {
            top: 50%; left: 0; right: 0; height: 1px;
        }
        
        .geometric-overlay::after {
            left: 50%; top: 0; bottom: 0; width: 1px;
        }

        /* Split Gap (Now Full Screen Mystical Room) */
        body {
            background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #050608 100%);
            background-size: cover;
        }

        .split-layout {
            display: block;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        .ritual-space {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.35;
            pointer-events: none;
            mix-blend-mode: screen;
        }
        
        .interpretation-space {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            background: transparent;
        }

        /* Floating Animation */
        @keyframes floating {
            0% { transform: translateY(0px) rotate(var(--base-rot, 0deg)); }
            50% { transform: translateY(-8px) rotate(calc(var(--base-rot, 0deg) + 2deg)); }
            100% { transform: translateY(0px) rotate(var(--base-rot, 0deg)); }
        }

        /* Tarot Spread CSS */
        .spread-container {
            position: relative;
            width: 100%;
            height: 70vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: visible;
        }

        .tarot-card {
            position: absolute;
            width: 120px;
            height: 190px;
            bottom: auto;
            transform-origin: bottom center;
            transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94), box-shadow 0.3s;
            cursor: pointer;
            perspective: 1000px;
        }
        
        @media (min-width: 768px) {
            .tarot-card {
                width: 140px;
                height: 220px;
            }
        }

        .tarot-card:hover:not(.is-flipped):not(.is-selected),
        .tarot-card.is-hovered:not(.is-flipped):not(.is-selected) {
            transform: translateY(-20px) scale(1.05) rotate(var(--base-rot, 0deg)) !important;
            z-index: 30 !important;
            box-shadow: 0 10px 30px rgba(233, 193, 118, 0.4);
            animation: none !important;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .tarot-card.is-flipped .card-inner {
            transform: rotateY(180deg);
        }
        
        .tarot-card.is-flipped:not(.is-selected) {
            z-index: 40 !important;
            transform: translateY(-40px) scale(1.2) rotate(var(--base-rot, 0deg)) !important;
            animation: none !important;
        }

        .tarot-card.is-selected {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1.8) rotate(0deg) !important;
            z-index: 100 !important;
            transition: all 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            bottom: auto;
            animation: none !important;
        }

        @media (min-width: 768px) {
            .tarot-card.is-selected {
                left: 50%;
            }
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden; /* Safari */
            backface-visibility: hidden;
            border-radius: theme('borderRadius.lg');
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .card-back {
            background-color: theme('colors.primary-container');
            border: 1px solid theme('colors.outline-variant');
            /* Mystical pattern */
            background-image: 
                radial-gradient(circle at center, rgba(233, 193, 118, 0.1) 2px, transparent 2px),
                radial-gradient(circle at center, rgba(233, 193, 118, 0.05) 1px, transparent 1px);
            background-size: 20px 20px, 10px 10px;
        }
        
        .card-back::after {
            content: '';
            position: absolute;
            inset: 8px;
            border: 1px solid rgba(233, 193, 118, 0.3);
            border-radius: 4px;
        }

        .card-front {
            background-color: theme('colors.surface-container-high');
            border: 1px solid theme('colors.secondary');
            transform: rotateY(180deg);
            padding: 12px;
        }
        
        .card-front::before {
            content: '';
            position: absolute;
            inset: 6px;
            border: 1px solid rgba(233, 193, 118, 0.5);
            border-radius: 2px;
        }

        #hand-cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-color: rgba(233, 193, 118, 0.8);
            box-shadow: 0 0 15px rgba(233, 193, 118, 0.5);
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            display: none;
            transition: background-color 0.2s, transform 0.1s;
        }
        
        #hand-cursor.pinching {
            background-color: rgba(255, 255, 255, 0.9);
            transform: translate(-50%, -50%) scale(0.8);
        }
    </style>

        document.addEventListener('DOMContentLoaded', () => {
            
            // --- Tarot Spread Setup ---
            const spreadContainer = document.getElementById('tarot-spread');
            const totalCards = 22;
            const radius = 600; // Adjust for spread curvature
            const startAngle = -45; // Spread from -45deg to +45deg
            const endAngle = 45;
            const angleStep = (endAngle - startAngle) / (totalCards - 1);
            
            const allCards = [];
            let isDeckSpread = false;
            let previousHandX = null;

            for (let i = 0; i < totalCards; i++) {
                const angle = startAngle + (i * angleStep);
                // Convert angle to radians for translation
                const rad = angle * (Math.PI / 180);
                
                // Calculate position to create an arc
                const tx = Math.sin(rad) * (radius * 0.4);
                const ty = (Math.cos(rad) * radius) - radius;

                const card = document.createElement('div');
                card.className = 'tarot-card';
                
                // Start as a pile in the center
                const initialTx = 0;
                const initialTy = i * -1.2; // Slight offset for 3D pile effect
                card.style.transform = `translate(${initialTx}px, ${initialTy}px) rotate(0deg)`;
                card.style.zIndex = i;
                
                // Apply floating animation inline
                card.style.animation = `floating 4s ease-in-out infinite`;
                card.style.animationDelay = `${i * 0.05}s`;
                
                // Store target transform for spreading later
                card.dataset.targetTransform = `translate(${tx}px, ${-ty}px) rotate(${angle}deg)`;
                card.dataset.baseTransform = `translate(${initialTx}px, ${initialTy}px) rotate(0deg)`; // Base is pile
                card.dataset.index = i;

                const cardData = tarotDeck[i];

                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-back">
                            <span class="material-symbols-outlined text-secondary mb-2" style="font-size: 32px;">filter_vintage</span>
                        </div>
                        <div class="card-front" style="padding: 0; overflow: hidden; border-radius: 0.5rem; background-color: #1a1a2e;">
                            <img src="${cardData.image}" alt="${cardData.name}" style="width: 100%; height: 100%; object-fit: cover;">
                        </div>
                    </div>
                `;

                // Add flip interaction (fallback for mouse)
                card.addEventListener('click', function() {
                    handleCardSelect(this);
                });

                spreadContainer.appendChild(card);
                allCards.push(card);
            }

            // ดึง Element ของส่วนแสดงคำทำนายมาเก็บไว้
            const readingResultPanel = document.getElementById('reading-result');
            const resultCardName = document.getElementById('result-card-name');
            const resultKeywords = document.getElementById('result-keywords');
            const resultDescription = document.getElementById('result-description');
            const resetBtn = document.getElementById('reset-btn');

            function handleCardSelect(card) {
                if (card.classList.contains('is-selected')) return;
                
                // ดึงข้อมูลไพ่ตาม index ที่เราเก็บไว้ใน dataset
                const cardIndex = parseInt(card.dataset.index);
                const cardData = tarotDeck[cardIndex];
                
                // 1. จัดการ Effect ของไพ่
                allCards.forEach(c => {
                    c.classList.remove('is-selected', 'is-flipped');
                    c.style.transform = c.dataset.baseTransform;
                    // ทำให้ไพ่ใบอื่นจางลงเพื่อให้โฟกัสที่ใบที่เลือก
                    if(c !== card) c.style.opacity = '0.15'; 
                });
                
                card.style.opacity = '1';
                card.classList.add('is-selected', 'is-flipped');
                
                // ปิดการคลิกไพ่ชั่วคราวระหว่างรออ่านคำทำนาย
                document.getElementById('tarot-spread').style.pointerEvents = 'none';
                
                // 2. แสดงข้อมูลคำทำนาย
                // รอให้ Animation พลิกไพ่ทำงานไปสักพักก่อนค่อยแสดงข้อความ
                setTimeout(() => {
                    // ใส่ข้อมูลไพ่
                    resultCardName.innerText = cardData.name;
                    resultKeywords.innerText = `[ ${cardData.meaning_upright} ]`;
                    resultDescription.innerText = cardData.description;
                    
                    // เปลี่ยน display กลับมาเพื่อเตรียมทำ Animation
                    readingResultPanel.style.display = 'flex';
                    
                    // เลื่อนหน้าจอลงมาจุดที่แสดงคำทำนายอัตโนมัติ เพื่อให้ผู้ใช้มองเห็นเนื้อหาและปุ่มเริ่มใหม่
                    readingResultPanel.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    
                    // หน่วงเวลา 50ms เพื่อให้เบราว์เซอร์เรนเดอร์ display: flex ก่อนใส่ opacity (ทำให้ Fade-in ทำงานสมบูรณ์)
                    setTimeout(() => {
                        readingResultPanel.classList.remove('opacity-0');
                        readingResultPanel.classList.add('opacity-100');
                    }, 50);
                }, 600); // ดีเลย์ 0.6 วินาที (เท่ากับเวลา transition ของไพ่)
            }

            // ฟังก์ชันสำหรับปุ่มเริ่มใหม่ (Reset)
            resetBtn.addEventListener('click', () => {
                // ซ่อนคำทำนายโดยเปลี่ยน Opacity เป็น 0 ก่อน (Fade-out)
                readingResultPanel.classList.remove('opacity-100');
                readingResultPanel.classList.add('opacity-0');
                
                setTimeout(() => {
                    // ปิดการแสดงผลจริงๆ เมื่อแอนิเมชันจางหายจบลง
                    readingResultPanel.style.display = 'none';
                    
                    // รีเซ็ตสถานะกองไพ่
                    isDeckSpread = false;
                    previousHandX = null;
                    document.querySelector('#instruction-header p').innerText = "ปัดมือผ่านกล้องเพื่อกรีดไพ่";

                    // รีเซ็ตไพ่ทุกใบกลับเป็นกอง
                    allCards.forEach((c, i) => {
                        c.classList.remove('is-selected', 'is-flipped');
                        c.style.setProperty('--base-rot', `0deg`);
                        c.style.transform = c.dataset.baseTransform;
                        c.style.animation = `floating 4s ease-in-out infinite`;
                        c.style.animationDelay = `${i * 0.05}s`;
                        c.style.opacity = '1'; // เอาความจางออก
                    });

                    // สำคัญ: เปิดการคลิกไพ่คืน เพื่อให้เล่นรอบใหม่ได้
                    document.getElementById('tarot-spread').style.pointerEvents = 'auto';
                }, 500);
            });


            // --- MediaPipe Logic ---
            const videoElement = document.getElementById('input_video');
            const canvasElement = document.getElementById('output_canvas');
            const canvasCtx = canvasElement.getContext('2d');
            const statusLabel = document.getElementById('tracking-status');
            const errorLabel = document.getElementById('error-message');
            const cursor = document.getElementById('hand-cursor');
            
            let cardSelectionCooldown = false;
            
            // Set canvas size to match parent
            function resizeCanvas() {
                const container = canvasElement.parentElement;
                canvasElement.width = container.clientWidth;
                canvasElement.height = container.clientHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            // Handle Camera Errors
            function handleCameraError(error) {
                console.error("Camera access denied or failed:", error);
                statusLabel.innerText = "SENSOR DISCONNECTED";
                statusLabel.classList.replace('text-tertiary', 'text-error');
                
                errorLabel.innerText = "ไม่สามารถเข้าถึงกล้องได้ กรุณาอนุญาตการใช้งานกล้อง";
                errorLabel.classList.remove('hidden');
            }

            // MediaPipe Hands Initialization
            const hands = new Hands({
                locateFile: (file) => {
                    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
                }
            });

            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.7,
                minTrackingConfidence: 0.7
            });

            function getDistance(p1, p2) {
                return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));
            }

            // Drawing Logic and Interaction
            hands.onResults((results) => {
                canvasCtx.save();
                canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
                
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    statusLabel.innerText = "ENERGY DETECTED";
                    statusLabel.classList.add('text-secondary');
                    
                    cursor.style.display = 'block';
                    
                    for (const landmarks of results.multiHandLandmarks) {
                        
                        // Draw Connectors with Gold Glow
                        canvasCtx.shadowBlur = 10;
                        canvasCtx.shadowColor = '#e9c176';
                        drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {
                            color: 'rgba(233, 193, 118, 0.4)', 
                            lineWidth: 2
                        });
                        
                        // Draw Landmarks (Nodes)
                        canvasCtx.shadowBlur = 15;
                        drawLandmarks(canvasCtx, landmarks, {
                            color: '#e9c176', 
                            fillColor: '#121414',
                            lineWidth: 1,
                            radius: 3
                        });
                        
                        // Special glow on fingertips
                        const fingerTips = [4, 8, 12, 16, 20];
                        fingerTips.forEach(tip => {
                            const point = landmarks[tip];
                            canvasCtx.beginPath();
                            canvasCtx.arc(point.x * canvasElement.width, point.y * canvasElement.height, 6, 0, 2 * Math.PI);
                            canvasCtx.fillStyle = 'rgba(233, 193, 118, 0.8)';
                            canvasCtx.fill();
                        });
                        
                        // Hand Tracking Logic for Tarot Selection
                        const indexTip = landmarks[8];
                        const thumbTip = landmarks[4];
                        
                        // Map index finger to screen coordinates
                        // (1 - x) to account for mirrored video if necessary, or just use mapped coords based on typical setup
                        // Mediapipe coordinates are [0, 1] relative to the input image
                        const screenX = (1 - indexTip.x) * window.innerWidth;
                        const screenY = indexTip.y * window.innerHeight;
                        
                        cursor.style.left = `${screenX}px`;
                        cursor.style.top = `${screenY}px`;
                        
                        // --- Swipe Detection for Spreading Deck ---
                        if (!isDeckSpread) {
                            if (previousHandX !== null) {
                                let distance = Math.abs(screenX - previousHandX);
                                if (distance > 60) { // Threshold for swiping
                                    isDeckSpread = true;
                                    // Animate spreading
                                    allCards.forEach((c, i) => {
                                        const angle = startAngle + (i * angleStep);
                                        c.style.setProperty('--base-rot', `${angle}deg`);
                                        c.style.transform = c.dataset.targetTransform;
                                        // Update floating animation base rotation
                                        c.style.animation = `floating 4s ease-in-out infinite`;
                                        c.style.animationDelay = `${i * 0.05}s`;
                                    });
                                    document.querySelector('#instruction-header p').innerText = "หยิบไพ่โดยการจีบนิ้วเพื่อเลือกไพ่ที่ดึงดูดคุณ";
                                }
                            }
                            previousHandX = screenX;
                            // Reset context and skip hover logic while stacked
                            canvasCtx.restore();
                            return; 
                        }
                        
                        // Check for hover
                        let hoveredCard = null;
                        
                        // Reset all hovers
                        allCards.forEach(c => c.classList.remove('is-hovered'));
                        
                        // Simple bounding box check
                        // Note: iterating backwards to favor cards drawn on top (higher z-index)
                        for (let i = allCards.length - 1; i >= 0; i--) {
                            const card = allCards[i];
                            if (card.classList.contains('is-selected')) continue;
                            
                            const rect = card.getBoundingClientRect();
                            if (screenX >= rect.left && screenX <= rect.right &&
                                screenY >= rect.top && screenY <= rect.bottom) {
                                hoveredCard = card;
                                card.classList.add('is-hovered');
                                break; // Only hover the top-most card
                            }
                        }
                        
                        // Pinch gesture detection
                        const pinchDistance = getDistance(indexTip, thumbTip);
                        const isPinching = pinchDistance < 0.05;
                        
                        if (isPinching) {
                            cursor.classList.add('pinching');
                            if (hoveredCard && !cardSelectionCooldown) {
                                handleCardSelect(hoveredCard);
                                cardSelectionCooldown = true;
                                setTimeout(() => { cardSelectionCooldown = false; }, 1000);
                            }
                        } else {
                            cursor.classList.remove('pinching');
                        }
                    }
                } else {
                    statusLabel.innerText = "AWAITING PRESENCE...";
                    statusLabel.classList.remove('text-secondary');
                    statusLabel.classList.add('text-tertiary');
                    cursor.style.display = 'none';
                    allCards.forEach(c => c.classList.remove('is-hovered'));
                }
                canvasCtx.restore();
            });

            // Camera Initialization (ใช้ Native WebRTC เพื่อความรวดเร็วและรองรับกล้องทุกรุ่น)
            let lastVideoTime = -1;
            async function processVideoFrame() {
                if (videoElement.currentTime !== lastVideoTime) {
                    lastVideoTime = videoElement.currentTime;
                    try {
                        await hands.send({image: videoElement});
                    } catch (error) {
                        console.warn("MediaPipe กำลังเตรียมความพร้อม...");
                    }
                }
                requestAnimationFrame(processVideoFrame);
            }

            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                // ไม่บังคับ Resolution ให้ระบบเลือกค่าที่ดีที่สุดของกล้องนั้นๆ เอง
                navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
                    .then((stream) => {
                        videoElement.srcObject = stream;
                        videoElement.addEventListener('loadeddata', () => {
                            videoElement.play();
                            statusLabel.innerText = "AWAITING PRESENCE...";
                            processVideoFrame(); // เริ่มลูปส่งภาพให้ AI วิเคราะห์
                        });
                    })
                    .catch((err) => {
                        handleCameraError(err);
                    });
            } else {
                handleCameraError(new Error("อุปกรณ์หรือเบราว์เซอร์ไม่รองรับกล้อง กรุณาใช้ HTTPS หรือ Live Server"));
            }
        });
    </script>
</body>
</html>
